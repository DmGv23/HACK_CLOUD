service: impactia-backend

frameworkVersion: '3'

provider:
  name: aws
  runtime: python3.9
  region: us-east-1
  stage: prod
  environment:
    GROQ_API_KEY: ${env:GROQ_API_KEY}
    TABLE_NAME: !Ref ImpactIAResultsTable
    BUCKET_NAME: !Ref ImpactIARawBucket

  # Permisos globales: Autorizamos a tus Lambdas a tocar S3, DynamoDB y SQS
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:Query
            - dynamodb:Scan
          Resource: !GetAtt ImpactIAResultsTable.Arn
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
          Resource: !Join ['', ['arn:aws:s3:::', !Ref ImpactIARawBucket, '/*']]
        - Effect: Allow
          Action:
            - sqs:SendMessage
            - sqs:ReceiveMessage
            - sqs:DeleteMessage
            - sqs:GetQueueAttributes
          Resource: !GetAtt ImpactIAQueue.Arn

functions:
  # 1. Lambda que genera la URL de S3
  getUploadUrl:
    handler: lambdas/get_upload_url.lambda_handler
    events:
      - httpApi:
          path: /upload
          method: get

  # 2. Lambda que consulta los datos para la web
  getResults:
    handler: lambdas/impactia-get-results.lambda_handler
    events:
      - httpApi:
          path: /results
          method: get

  # 3. Lambda Procesadora de IA (Se dispara por SQS, no por URL)
  processor:
    handler: lambdas/processor.lambda_handler
    timeout: 30
    events:
      - sqs:
          arn: !GetAtt ImpactIAQueue.Arn
          batchSize: 1 

resources:
  Resources:
    # --- 1. BASE DE DATOS DYNAMODB ---
    ImpactIAResultsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ImpactIAResults
        AttributeDefinitions:
          - AttributeName: UploadId
            AttributeType: S
        KeySchema:
          - AttributeName: UploadId
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST

    # --- 2. COLA DE MENSAJERÍA SQS ---
    ImpactIAQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ImpactIAQueue
        VisibilityTimeout: 60

    # --- 3. BUCKET DE S3 (Con trigger hacia SQS) ---
    ImpactIARawBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: impactia-archivos-raw-2026
        NotificationConfiguration:
          QueueConfigurations:
            - Event: s3:ObjectCreated:*
              Queue: !GetAtt ImpactIAQueue.Arn

    # Permiso para que S3 le pueda escribir a la cola SQS
    S3ToSQSPolicy:
      Type: AWS::SQS::QueuePolicy
      Properties:
        Queues:
          - !Ref ImpactIAQueue
        PolicyDocument:
          Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Principal: "*"
              Action: sqs:SendMessage
              Resource: !GetAtt ImpactIAQueue.Arn
              Condition:
                ArnLike:
                  aws:SourceArn: !Join ['', ['arn:aws:s3:::', !Ref ImpactIARawBucket]]